apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-java
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: java-app
          image: mi-backend:v11
          imagePullPolicy: Never # IMPORTANTE: Usa la imagen que acabas de crear localmente
          ports:
            - containerPort: 8080
          env:
            - name: CLAVE_JWT # Nombre que usará Java
              valueFrom:
                secretKeyRef:
                  name: mi-seguridad # Nombre del Secret de K8s
                  key: JWT_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-angular
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: angular-app
          image: mi-frontend:v11
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer # Esto crea la URL para entrar desde tu navegador
  selector:
    app: frontend
  ports:
    - port: 8081
      targetPort: 80
