<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOR - Resumen Diario</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Layout de tres columnas */
      .columnas-container {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        align-items: flex-start;
      }
      .columna-turno {
        flex: 1;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border: 1px solid #ddd;
      }
      .turno-titulo {
        background-color: #2c3e50;
        color: white;
        padding: 12px;
        margin: 0;
        font-size: 1.1rem;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      /* Estilo de las mini-columnas (filas de datos) */
      .dato-fila {
        display: flex;
        justify-content: space-between;
        padding: 10px 15px;
        border-bottom: 1px solid #eee;
        align-items: center;
      }
      .dato-fila:last-child {
        border-bottom: none;
      }
      .dato-tipo {
        font-weight: 600;
        color: #34495e;
        font-size: 0.9rem;
        text-transform: uppercase;
      }
      .dato-valor {
        font-weight: bold;
        color: #2980b9;
        font-size: 1.1rem;
        min-width: 30px;
        text-align: right;
      }
      .seccion-titulo {
        background: #f8f9fa;
        padding: 5px 15px;
        font-size: 0.8rem;
        font-weight: bold;
        color: #7f8c8d;
        border-bottom: 1px solid #eee;
      }
      .sin-datos-caja {
        text-align: center;
        padding: 40px;
        width: 100%; /* Sustituye a grid-column para ocupar todo el ancho en Flexbox */
        color: #7f8c8d;
        background: white;
        border-radius: 8px;
        border: 1px dashed #ccc;
        box-sizing: border-box; /* Asegura que el padding no desborde el ancho */
      }
      /* Responsive: en móviles se ponen una debajo de otra */
      @media (max-width: 768px) {
        .columnas-container {
          flex-direction: column;
        }
      }

      .link-indicativos {
        display: block;
        text-align: center;
        padding: 8px;
        background-color: #fdfdfd;
        color: #3498db;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        border-bottom: 1px solid #eee;
        transition: background 0.2s;
      }

      .link-indicativos:hover {
        background-color: #f1f1f1;
        color: #2980b9;
      }
    </style>
  </head>
  <body>
    <div id="header-container"></div>

    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header-container").innerHTML = data;
        });

      function abrirMenu() {
        document.getElementById("sidebar").classList.add("active");
        document.getElementById("overlay").classList.add("active");
      }
      function cerrarMenu() {
        document.getElementById("sidebar").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
      }
    </script>

    <h1 class="titulo-pagina">Resumen Diario de Actividad</h1>

    <div class="date-nav-container">
      <button id="prevDay" class="btn-nav">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div style="position: relative">
        <span id="current-date">--/--/----</span>
        <input type="date" id="datepicker" />
      </div>
      <button id="nextDay" class="btn-nav">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <div class="content">
      <div class="columnas-container" id="contenedor-resumen"></div>
    </div>

    <script>
      let fechaActual = new Date();
      const datePicker = document.getElementById("datepicker");
      const dateDisplay = document.getElementById("current-date");
      const contenedor = document.getElementById("contenedor-resumen");

      dateDisplay.onclick = () => datePicker.showPicker();
      datePicker.onchange = (e) => {
        if (e.target.value) {
          fechaActual = new Date(e.target.value);
          actualizar();
        }
      };

      async function cargarResumen() {
        const yyyy = fechaActual.getFullYear();
        const mm = String(fechaActual.getMonth() + 1).padStart(2, "0");
        const dd = String(fechaActual.getDate()).padStart(2, "0");

        // Regex para 8 números y una letra (Español)
        const espRegExp = /^\d{8}[a-zA-Z]$/;

        try {
          const res = await fetch(
            `/obtener-partes?yyyy=${yyyy}&mm=${mm}&dd=${dd}`,
          );
          const partes = await res.json();

          const datosAgrupados = {
            Mañana: {
              filiados: { esp: 0, ext: 0 },
              vehiculos: 0,
              detenidos: { esp: 0, ext: 0 },
              sancionados: { esp: 0, ext: 0 },
              motivos: {},
            },
            Tarde: {
              filiados: { esp: 0, ext: 0 },
              vehiculos: 0,
              detenidos: { esp: 0, ext: 0 },
              sancionados: { esp: 0, ext: 0 },
              motivos: {},
            },
            Noche: {
              filiados: { esp: 0, ext: 0 },
              vehiculos: 0,
              detenidos: { esp: 0, ext: 0 },
              sancionados: { esp: 0, ext: 0 },
              motivos: {},
            },
          };

          partes.forEach((p) => {
            const turno = p.turno || "Desconocido";
            if (datosAgrupados[turno]) {
              if (p.filiacion) {
                p.filiacion.forEach((f) => {
                  const esEspanol =
                    f.documento && espRegExp.test(f.documento.trim());

                  if (esEspanol) {
                    datosAgrupados[turno].filiados.esp++;
                    if (f.detenido && f.detenido.length > 0)
                      datosAgrupados[turno].detenidos.esp++;
                    if (f.sancionado && f.sancionado.length > 0)
                      datosAgrupados[turno].sancionados.esp++;
                  } else {
                    datosAgrupados[turno].filiados.ext++;
                    if (f.detenido && f.detenido.length > 0)
                      datosAgrupados[turno].detenidos.ext++;
                    if (f.sancionado && f.sancionado.length > 0)
                      datosAgrupados[turno].sancionados.ext++;
                  }
                });
              }

              datosAgrupados[turno].vehiculos += p.objetos
                ? p.objetos.length
                : 0;

              if (p.servicios) {
                p.servicios.forEach((s) => {
                  const m = s.motivo
                    ? s.motivo.trim().toUpperCase()
                    : "SIN MOTIVO";
                  datosAgrupados[turno].motivos[m] =
                    (datosAgrupados[turno].motivos[m] || 0) + 1;
                });
              }
            }
          });

          contenedor.innerHTML = "";

          if (partes.length === 0) {
            contenedor.innerHTML = `<div class="sin-datos-caja">No hay partes de servicio registrados para esta fecha.</div>`;
            return;
          }

          const iconos = {
            Mañana: "fa-sun",
            Tarde: "fa-cloud-sun",
            Noche: "fa-moon",
          };

          ["Mañana", "Tarde", "Noche"].forEach((turno) => {
            const d = datosAgrupados[turno];
            const col = document.createElement("div");
            col.className = "columna-turno";

            let motivosHtml = "";
            const motivosKeys = Object.keys(d.motivos);
            if (motivosKeys.length > 0) {
              motivosHtml = motivosKeys
                .map(
                  (k) => `
                <div class="dato-fila">
                  <span class="dato-tipo">${k}</span>
                  <span class="dato-valor">${d.motivos[k]}</span>
                </div>
              `,
                )
                .join("");
            } else {
              motivosHtml = `<div class="dato-fila"><span class="dato-tipo" style="color:#bdc3c7">Sin servicios</span></div>`;
            }

            const fechaISO = fechaActual.toISOString().split("T")[0]; // Obtiene la fecha en formato YYYY-MM-DD

            col.innerHTML = `
              <a href="indicativos.html?fecha=${fechaISO}&turno=${turno.toUpperCase()}" class="link-indicativos">
    <i class="fas fa-external-link-alt"></i> Visualizar Tabla de Indicativos
  </a>
  <h2 class="turno-titulo"><i class="fas ${iconos[turno]}"></i> ${turno}</h2>
              <div class="seccion-titulo">ESTADÍSTICAS (ESP / EXT)</div>
              <div class="dato-fila">
                <span class="dato-tipo">Total Filiados</span>
                <span class="dato-valor">${d.filiados.esp} / ${d.filiados.ext}</span>
              </div>
              <div class="dato-fila">
                <span class="dato-tipo">Vehículos/Objetos</span>
                <span class="dato-valor">${d.vehiculos}</span>
              </div>
              <div class="dato-fila">
                <span class="dato-tipo">Detenidos</span>
                <span class="dato-valor" style="color: #c0392b;">${d.detenidos.esp} / ${d.detenidos.ext}</span>
              </div>
              <div class="dato-fila">
                <span class="dato-tipo">Sancionados</span>
                <span class="dato-valor" style="color: #e67e22;">${d.sancionados.esp} / ${d.sancionados.ext}</span>
              </div>
              <div class="seccion-titulo">DESGLOSE POR MOTIVO</div>
              ${motivosHtml}
            `;
            contenedor.appendChild(col);
          });
        } catch (e) {
          contenedor.innerHTML = `<div class="sin-datos-caja" style="color:red;">Error al conectar con el servidor.</div>`;
        }
      }

      function actualizar() {
        dateDisplay.textContent = `${String(fechaActual.getDate()).padStart(2, "0")}/${String(fechaActual.getMonth() + 1).padStart(2, "0")}/${fechaActual.getFullYear()}`;
        datePicker.value = fechaActual.toISOString().split("T")[0];
        cargarResumen();
      }

      document.getElementById("prevDay").onclick = () => {
        fechaActual.setDate(fechaActual.getDate() - 1);
        actualizar();
      };
      document.getElementById("nextDay").onclick = () => {
        fechaActual.setDate(fechaActual.getDate() + 1);
        actualizar();
      };

      actualizar();
    </script>
  </body>
</html>
